  // --- Tárolás shim: a Claude window.storage helyett localStorage (eszközönként) ---
  window.storage = {
    async get(key, shared){ try{ const v=localStorage.getItem("t7:"+key); return v?{key,value:v,shared}:null; }catch(e){ return null; } },
    async set(key, value, shared){ try{ localStorage.setItem("t7:"+key, value); }catch(e){} return {key,value,shared}; },
    async delete(key, shared){ try{ localStorage.removeItem("t7:"+key); }catch(e){} return {key,deleted:true,shared}; },
    async list(prefix, shared){ const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith("t7:"+(prefix||""))) keys.push(k.slice(3)); } return {keys,prefix,shared}; }
  };
  const { useState, useEffect, useMemo, useCallback, useRef } = React;


/* ===================== Konstansok ===================== */
const HONAPOK = ["január","február","március","április","május","június","július","augusztus","szeptember","október","november","december"];
const NAPOK_ROVID = ["H","K","Sze","Cs","P","Szo","V"];
const NAPOK_TELJES = ["Hétfő","Kedd","Szerda","Csütörtök","Péntek","Szombat","Vasárnap"];

const SZINEK = [
  { id:"red",hex:"#FF3B30",nev:"Piros" },{ id:"orange",hex:"#FF9500",nev:"Narancs" },{ id:"yellow",hex:"#FFC400",nev:"Sárga" },
  { id:"green",hex:"#34C759",nev:"Zöld" },{ id:"teal",hex:"#30B0C7",nev:"Türkiz" },{ id:"blue",hex:"#007AFF",nev:"Kék" },
  { id:"indigo",hex:"#5856D6",nev:"Indigó" },{ id:"purple",hex:"#AF52DE",nev:"Lila" },{ id:"pink",hex:"#FF2D55",nev:"Rózsaszín" },

const KATEGORIAK = [

];
const SZEREPEK = [{id:"admin",nev:"Admin"},{id:"szerkeszto",nev:"Szerkesztő"},{id:"nezo",nev:"Néző"}];

const KEY_KOLLEGAK = "csapatnaptar:kollegak";
const KEY_ESEMENYEK = "csapatnaptar:esemenyek";

const APP_NEV = "T7 naptár";
const VERZIO = "v1.0.3";

const KEZDO_KOLLEGAK = [
  { id:"k1", nev:"Anna",  szin:"blue",   email:"", csapat:"Értékesítés", szerep:"admin" },
  { id:"k2", nev:"Béla",  szin:"green",  email:"", csapat:"Fejlesztés",  szerep:"szerkeszto" },
  { id:"k3", nev:"Csaba", szin:"orange", email:"", csapat:"Fejlesztés",  szerep:"szerkeszto" },
];

/* ===================== Segédfüggvények ===================== */
const ujId = () => Math.random().toString(36).slice(2,10);
const ymd = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const azonosNap = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const szinHex = (id) => (SZINEK.find(s=>s.id===id)||SZINEK[5]).hex;
const hetfoIndex = (d) => (d.getDay()+6)%7;
const rovidDatum = (iso) => { const [,m,d]=iso.split("-"); return `${parseInt(m,10)}. ${parseInt(d,10)}.`; };
const ervenyesEmail = (em) => !!em && /\S+@\S+\.\S+/.test(em);
const kat = (id) => KATEGORIAK.find(k=>k.id===id) || KATEGORIAK[0];
const enc = (s) => encodeURIComponent(s);

function honapNapjai(ev, honap){
  const elso=new Date(ev,honap,1); const kezdet=new Date(ev,honap,1-hetfoIndex(elso)); const t=[];
  for(let i=0;i<42;i++){ const d=new Date(kezdet); d.setDate(kezdet.getDate()+i); t.push(d);} return t;
}
function hetKezdet(d){ const x=new Date(d); x.setDate(x.getDate()-hetfoIndex(x)); x.setHours(0,0,0,0); return x; }

function normalizal(e){
  return {
    id:e.id||ujId(), cim:e.cim||"",
    kollegaIds:Array.isArray(e.kollegaIds)?e.kollegaIds:(e.kollegaId?[e.kollegaId]:[]),
    kategoria:e.kategoria||"megbeszeles", allapot:e.allapot||"megerosit",
    egeszNapos:!!e.egeszNapos, datum:e.datum, vegDatum:e.vegDatum||e.datum,
    kezdo:e.kezdo||"09:00", veg:e.veg||"10:00", helyszin:e.helyszin||"", link:e.link||"", megjegyzes:e.megjegyzes||"",
    ismetles:e.ismetles||"nincs", ismetlesVeg:e.ismetlesVeg||"",
    letrehozta:e.letrehozta||"", modositotta:e.modositotta||"", modositva:e.modositva||"",
  };
}

/* Előfordul-e az esemény az adott napon (ismétlést is kezeli) */
function elofordul(e, d){
  const nap = ymd(d);
  if(!e.ismetles || e.ismetles==="nincs") return e.datum<=nap && (e.vegDatum||e.datum)>=nap;
  if(nap < e.datum) return false;
  if(e.ismetlesVeg && nap > e.ismetlesVeg) return false;
  const start = new Date(e.datum+"T00:00:00");
  if(e.ismetles==="nap") return true;
  if(e.ismetles==="het") return d.getDay()===start.getDay();
  if(e.ismetles==="honap") return d.getDate()===start.getDate();
  return false;
}

/* Magyar ünnepnapok */
function husvet(ev){
  const a=ev%19,b=Math.floor(ev/100),c=ev%100,dd=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
    h=(19*a+b-dd-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
    ho=Math.floor((h+l-7*m+114)/31),nap=((h+l-7*m+114)%31)+1;
  return new Date(ev,ho-1,nap);
}
const unnepCache = {};
function unnepekEv(ev){
  if(unnepCache[ev]) return unnepCache[ev];
  const h=husvet(ev); const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
  const m={}; const set=(d,nev)=>{m[ymd(d)]=nev;};
  set(new Date(ev,0,1),"Újév"); set(new Date(ev,2,15),"Nemzeti ünnep");
  set(add(h,-2),"Nagypéntek"); set(h,"Húsvétvasárnap"); set(add(h,1),"Húsvéthétfő");
  set(new Date(ev,4,1),"A munka ünnepe"); set(add(h,49),"Pünkösdvasárnap"); set(add(h,50),"Pünkösdhétfő");
  set(new Date(ev,7,20),"Államalapítás"); set(new Date(ev,9,23),"1956 emléknapja");
  set(new Date(ev,10,1),"Mindenszentek"); set(new Date(ev,11,25),"Karácsony"); set(new Date(ev,11,26),"Karácsony másnapja");
  unnepCache[ev]=m; return m;
}
const unnepNev = (d) => unnepekEv(d.getFullYear())[ymd(d)] || null;

/* ===================== Értesítés / export ===================== */
function esemenyKollegak(e,kollegak){ return e.kollegaIds.map(id=>kollegak.find(k=>k.id===id)).filter(Boolean); }
function esemenyEmailek(e,kollegak){ return esemenyKollegak(e,kollegak).map(k=>k.email).filter(ervenyesEmail); }
function idopontSzoveg(e){
  if(e.egeszNapos) return e.datum===e.vegDatum?`${e.datum} (egész nap)`:`${e.datum} – ${e.vegDatum} (egész nap)`;
  return e.datum===e.vegDatum?`${e.datum} ${e.kezdo}–${e.veg}`:`${e.datum} ${e.kezdo} – ${e.vegDatum} ${e.veg}`;
}
function mailtoLink(e,kollegak){
  const cimzettek=esemenyEmailek(e,kollegak).join(",");
  const sorok=[`Esemény: ${e.cim||""}`,`Időpont: ${idopontSzoveg(e)}`,e.helyszin?`Helyszín: ${e.helyszin}`:"",e.link?`Link: ${e.link}`:"",e.megjegyzes?`\n${e.megjegyzes}`:""].filter(Boolean);
  return `mailto:${cimzettek}?subject=${enc("Emlékeztető: "+(e.cim||"Esemény"))}&body=${enc(sorok.join("\n"))}`;
}
function veventSorok(e,kollegak){
  const pad=n=>String(n).padStart(2,"0"); const most=new Date();
  const stamp=`${most.getUTCFullYear()}${pad(most.getUTCMonth()+1)}${pad(most.getUTCDate())}T${pad(most.getUTCHours())}${pad(most.getUTCMinutes())}${pad(most.getUTCSeconds())}Z`;
  const d=iso=>iso.replace(/-/g,""); const masnap=iso=>{const x=new Date(iso+"T00:00:00");x.setDate(x.getDate()+1);return d(ymd(x));};
  let s,v;
  if(e.egeszNapos){ s=`DTSTART;VALUE=DATE:${d(e.datum)}`; v=`DTEND;VALUE=DATE:${masnap(e.vegDatum)}`; }
  else { s=`DTSTART:${d(e.datum)}T${(e.kezdo||"09:00").replace(":","")}00`; v=`DTEND:${d(e.vegDatum)}T${(e.veg||"10:00").replace(":","")}00`; }
  const esc=x=>(x||"").replace(/([\\,;])/g,"\\$1").replace(/\n/g,"\\n");
  const nevek=esemenyKollegak(e,kollegak).map(k=>k.nev).join(", ");
  const leiras=[nevek?`Résztvevők: ${nevek}`:"", e.link?`Link: ${e.link}`:"", e.megjegyzes].filter(Boolean).join("\\n");
  const reszt=esemenyKollegak(e,kollegak).filter(k=>ervenyesEmail(k.email)).map(k=>`ATTENDEE;CN=${esc(k.nev)}:mailto:${k.email}`);
  let rrule="";
  if(e.ismetles && e.ismetles!=="nincs"){
    const f={nap:"DAILY",het:"WEEKLY",honap:"MONTHLY"}[e.ismetles];
    rrule=`RRULE:FREQ=${f}${e.ismetlesVeg?`;UNTIL=${d(e.ismetlesVeg)}T235900Z`:""}`;
  }
  return ["BEGIN:VEVENT",`UID:${e.id}@t7naptar`,`DTSTAMP:${stamp}`,s,v,
    `SUMMARY:${esc((kat(e.kategoria).ikon)+" "+e.cim)}`,
    e.helyszin?`LOCATION:${esc(e.helyszin)}`:"", leiras?`DESCRIPTION:${leiras}`:"", rrule,
    ...reszt,"BEGIN:VALARM","TRIGGER:-PT30M","ACTION:DISPLAY","DESCRIPTION:Emlékeztető","END:VALARM","END:VEVENT"
  ].filter(Boolean);
}
function letolt(tartalom,nev,mime){
  const blob=new Blob([tartalom],{type:mime+";charset=utf-8"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=nev; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function icsLetoltesEgy(e,kollegak){
  letolt(["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//T7 naptár//HU","CALSCALE:GREGORIAN","METHOD:PUBLISH",...veventSorok(e,kollegak),"END:VCALENDAR"].join("\r\n"),
    `${(e.cim||"esemeny").replace(/[^\p{L}\d]+/gu,"_").slice(0,40)||"esemeny"}.ics`,"text/calendar");
}

/* ===================== Tárolás ===================== */
async function betolt(kulcs,alap,megosztott=true){
  try{ const r=await window.storage.get(kulcs,megosztott); return r?JSON.parse(r.value):alap; }catch{ return alap; }
}
async function ment(kulcs,ertek,megosztott=true){
  try{ await window.storage.set(kulcs,JSON.stringify(ertek),megosztott); }catch(e){ console.error(e); }
}

/* ===================== Fő komponens ===================== */
function App(){
  const ma = useMemo(()=>new Date(),[]);
  const [betoltodik,setBetoltodik]=useState(true);
  const [kollegak,setKollegak]=useState([]);
  const [esemenyek,setEsemenyek]=useState([]);
  const [enId,setEnId]=useState("");
  const [temaSotet,setTemaSotet]=useState(false);

  const [megjelenitettHonap,setMegjelenitettHonap]=useState(new Date(ma.getFullYear(),ma.getMonth(),1));
  const [kivalasztottNap,setKivalasztottNap]=useState(new Date(ma.getFullYear(),ma.getMonth(),ma.getDate()));
  const [nezet,setNezet]=useState("honap"); // honap | het | nap
  const [szuro,setSzuro]=useState(null);
  const [csapatSzuro,setCsapatSzuro]=useState("");
  const [kereso,setKereso]=useState(null); // null = zárva, "" vagy szöveg = nyitva

  const [modal,setModal]=useState(null);
  const [kollegaPanel,setKollegaPanel]=useState(false);
  const [beallitasok,setBeallitasok]=useState(false);

  const [slide,setSlide]=useState(0);
  const erint=useRef({x:0,y:0});

  useEffect(()=>{(async()=>{
    const k=await betolt(KEY_KOLLEGAK,null);
    const e=await betolt(KEY_ESEMENYEK,[]);
    const id=await betolt(KEY_ENID,"",false);
    const t=await betolt(KEY_TEMA,false,false);
    if(k===null){ await ment(KEY_KOLLEGAK,KEZDO_KOLLEGAK); setKollegak(KEZDO_KOLLEGAK); }
    else setKollegak(k.map(x=>({email:"",csapat:"",szerep:"szerkeszto",...x})));
    setEsemenyek((Array.isArray(e)?e:[]).map(normalizal));
    setEnId(id||""); setTemaSotet(!!t);
    setBetoltodik(false);
  })();},[]);

  const mentEsemenyek=useCallback((u)=>{ setEsemenyek(u); ment(KEY_ESEMENYEK,u); },[]);
  const mentKollegak=useCallback((u)=>{ setKollegak(u); ment(KEY_KOLLEGAK,u); },[]);
  const valtTema=()=>{ setTemaSotet(t=>{ const uj=!t; ment(KEY_TEMA,uj,false); return uj; }); };
  const valtEnId=(id)=>{ setEnId(id); ment(KEY_ENID,id,false); };

  const enKollega = kollegak.find(k=>k.id===enId) || null;
  const canEdit = !enKollega || enKollega.szerep!=="nezo";
  const csapatok = useMemo(()=>[...new Set(kollegak.map(k=>k.csapat).filter(Boolean))],[kollegak]);

  const napok=useMemo(()=>honapNapjai(megjelenitettHonap.getFullYear(),megjelenitettHonap.getMonth()),[megjelenitettHonap]);

  const lathato=useCallback((e)=>{
    if(szuro && !e.kollegaIds.includes(szuro)) return false;
    if(csapatSzuro && !e.kollegaIds.some(id=>kollegak.find(k=>k.id===id)?.csapat===csapatSzuro)) return false;
    return true;
  },[szuro,csapatSzuro,kollegak]);

  const napAgenda=useCallback((d)=>esemenyek.filter(e=>lathato(e)&&elofordul(e,d))
    .sort((a,b)=>a.egeszNapos!==b.egeszNapos?(a.egeszNapos?-1:1):(a.kezdo||"").localeCompare(b.kezdo||"")),[esemenyek,lathato]);

  const kollegaSzin=(id)=>{ const k=kollegak.find(x=>x.id===id); return k?szinHex(k.szin):"#C7C7CC"; };
  const esemenySzinek=(e)=> e.kollegaIds.length?e.kollegaIds.map(kollegaSzin):["#C7C7CC"];

  /* Jelenlét egy kollégára adott napon */
  const jelenlet=(kollegaId,d)=>{
    const tav=esemenyek.filter(e=>e.kollegaIds.includes(kollegaId)&&elofordul(e,d)).map(e=>kat(e.kategoria)).filter(k=>k.tavollet);
    if(!tav.length) return {ikon:"🏢",cimke:"Irodában"};
    const ho=tav.find(k=>k.tavollet==="ho"); const tavol=tav.find(k=>k.tavollet==="tavol");
    if(tavol) return {ikon:tavol.ikon,cimke:tavol.nev};
    if(ho) return {ikon:"🏠",cimke:"Home office"};
    return {ikon:"🏢",cimke:"Irodában"};
  };

  /* Navigáció */
  const lepHonap=(i)=>{ setSlide(i); setMegjelenitettHonap(d=>new Date(d.getFullYear(),d.getMonth()+i,1)); };
  const ugrasMa=()=>{ setSlide(0); const m=new Date(); setMegjelenitettHonap(new Date(m.getFullYear(),m.getMonth(),1)); setKivalasztottNap(new Date(m.getFullYear(),m.getMonth(),m.getDate())); };
  const erintKezd=(e)=>{ const t=e.touches[0]; erint.current={x:t.clientX,y:t.clientY}; };
  const erintVeg=(e)=>{ const t=e.changedTouches[0]; const dx=t.clientX-erint.current.x, dy=t.clientY-erint.current.y;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)) lepHonap(dx<0?1:-1); };

  /* Modal */
  const ujEsemeny=()=>{ if(!canEdit) return; setModal({
    id:null,cim:"",kollegaIds:[],kategoria:"megbeszeles",allapot:"megerosit",egeszNapos:false,
    datum:ymd(kivalasztottNap),vegDatum:ymd(kivalasztottNap),kezdo:"09:00",veg:"10:00",
    helyszin:"",link:"",megjegyzes:"",ismetles:"nincs",ismetlesVeg:"",
  }); };
  const nyitEsemeny=(e)=> setModal({...e,kollegaIds:[...e.kollegaIds]});

  const mentModal=()=>{
    if(!modal.cim.trim()||!canEdit) return;
    const most=new Date().toISOString().slice(0,16).replace("T"," ");
    const t={...modal}; if(t.vegDatum<t.datum) t.vegDatum=t.datum;
    t.modositotta=enId; t.modositva=most; if(!t.letrehozta) t.letrehozta=enId;
    const uj=t.id?esemenyek.map(e=>e.id===t.id?t:e):[...esemenyek,{...t,id:ujId()}];
    mentEsemenyek(uj); setModal(null);
  };
  const torolModal=()=>{ if(!canEdit) return; mentEsemenyek(esemenyek.filter(e=>e.id!==modal.id)); setModal(null); };

  /* Ütközések a modal eseményéhez */
  const utkozesek=useMemo(()=>{
    if(!modal) return [];
    const d=new Date(modal.datum+"T00:00:00"); const lista=[];
    esemenyek.forEach(e2=>{
      if(e2.id===modal.id) return; if(!elofordul(e2,d)) return;
      const kozos=modal.kollegaIds.filter(id=>e2.kollegaIds.includes(id)); if(!kozos.length) return;
      let utk=true; if(!modal.egeszNapos&&!e2.egeszNapos) utk=(modal.kezdo<e2.veg)&&(e2.kezdo<modal.veg);
      if(utk) kozos.forEach(id=>lista.push({nev:kollegak.find(k=>k.id===id)?.nev,cim:e2.cim}));
    });
    return lista;
  },[modal,esemenyek,kollegak]);

  /* Keresés */
  const talalatok=useMemo(()=>{
    const sz=(kereso||"").trim().toLowerCase(); if(!sz) return [];
    return esemenyek.filter(e=>lathato(e)).filter(e=>{
      const nevek=esemenyKollegak(e,kollegak).map(k=>k.nev).join(" ");
      return [e.cim,e.helyszin,e.megjegyzes,nevek,kat(e.kategoria).nev].join(" ").toLowerCase().includes(sz);
    }).sort((a,b)=>(a.datum+a.kezdo).localeCompare(b.datum+b.kezdo));
  },[kereso,esemenyek,kollegak,lathato]);

  /* Exportok / digest */
  const osszesIcs=()=>letolt(["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//T7 naptár//HU","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    ...esemenyek.flatMap(e=>veventSorok(e,kollegak)),"END:VCALENDAR"].join("\r\n"),"T7-naptar.ics","text/calendar");
  const csvExport=()=>{
    const fej=["Cím","Kategória","Kezdő nap","Záró nap","Egész napos","Kezdés","Vége","Helyszín","Link","Kollégák","Állapot","Ismétlés","Megjegyzés"];
    const sorok=esemenyek.map(e=>[e.cim,kat(e.kategoria).nev,e.datum,e.vegDatum,e.egeszNapos?"igen":"nem",e.egeszNapos?"":e.kezdo,e.egeszNapos?"":e.veg,
      e.helyszin,e.link,esemenyKollegak(e,kollegak).map(k=>k.nev).join("; "),e.allapot==="elozetes"?"előzetes":"megerősített",
      e.ismetles==="nincs"?"":({nap:"napi",het:"heti",honap:"havi"}[e.ismetles]||""),(e.megjegyzes||"").replace(/\n/g," ")]);
    const csv=[fej,...sorok].map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
    letolt("\uFEFF"+csv,"T7-naptar.csv","text/csv");
  };
  const napiDigestLink=()=>{
    const d=kivalasztottNap; const lista=napAgenda(d);
    const cimzettek=[...new Set(kollegak.map(k=>k.email).filter(ervenyesEmail))].join(",");
    const sorok=lista.length?lista.map(e=>`• ${e.egeszNapos?"egész nap":e.kezdo+"–"+e.veg} ${kat(e.kategoria).ikon} ${e.cim}${e.helyszin?" ("+e.helyszin+")":""} – ${esemenyKollegak(e,kollegak).map(k=>k.nev).join(", ")}`):["Nincs program ezen a napon."];
    return `mailto:${cimzettek}?subject=${enc(`Napi program – ${ymd(d)}`)}&body=${enc(sorok.join("\n"))}`;
  };

  if(betoltodik) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:FONT,color:"#8E8E93",background:temaSotet?"#000":"#F2F2F7"}}>{APP_NEV} betöltése…</div>;

  /* ---- Egy esemény sor (több helyen újrahasznosítva) ---- */
  const renderEsemeny=(e)=>{
    const szinek=esemenySzinek(e); const k=kat(e.kategoria); const elozetes=e.allapot==="elozetes";
    const tobbNapos=e.datum!==e.vegDatum && (!e.ismetles||e.ismetles==="nincs");
    return (
      <button key={e.id} onClick={()=>nyitEsemeny(e)} style={{...styles.esemenySor, opacity:elozetes?0.62:1}}>
        <div style={{display:"flex",flexDirection:"column",width:4,borderRadius:4,overflow:"hidden",alignSelf:"stretch"}}>
          {szinek.map((h,i)=><div key={i} style={{flex:1,background:h}} />)}
        </div>
        <div style={{width:62,textAlign:"right",flexShrink:0}}>
          {e.egeszNapos?<div style={styles.ido}>egész nap</div>:<><div style={styles.ido}>{e.kezdo||"—"}</div><div style={styles.idoVeg}>{e.veg||""}</div></>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={styles.esemenyCim}>{k.ikon} {e.cim}{elozetes?<span style={{color:"#8E8E93",fontWeight:400}}> (előzetes)</span>:null}</div>
          <div style={styles.esemenyMeta}>
            {e.kollegaIds.length?e.kollegaIds.map((id,i)=><span key={id} style={{color:kollegaSzin(id),fontWeight:600}}>{kollegak.find(k=>k.id===id)?.nev}{i<e.kollegaIds.length-1?", ":""}</span>):<span style={{color:"#8E8E93"}}>Nincs hozzárendelve</span>}
            {e.helyszin?<span style={{color:"#8E8E93"}}>  ·  📍 {e.helyszin}</span>:null}
            {e.link?<span style={{color:"#8E8E93"}}>  ·  🔗</span>:null}
          </div>
          {tobbNapos&&<div style={styles.tartomany}>📅 {rovidDatum(e.datum)} – {rovidDatum(e.vegDatum)}</div>}
          {e.ismetles&&e.ismetles!=="nincs"&&<div style={styles.tartomany}>🔁 {({nap:"naponta",het:"hetente",honap:"havonta"}[e.ismetles])}</div>}
        </div>
      </button>
    );
  };

  /* ---- Egy nap blokkja (hét nézethez) ---- */
  const renderNapBlokk=(d)=>{
    const lista=napAgenda(d); const u=unnepNev(d); const kivalasztott=azonosNap(d,kivalasztottNap);
    return (
      <div key={ymd(d)}>
        <button onClick={()=>setKivalasztottNap(new Date(d))} style={{...styles.hetNapFej, ...(kivalasztott?{color:"#FF3B30"}:{})}}>
          <span style={{fontWeight:700}}>{NAPOK_TELJES[hetfoIndex(d)]}</span>
          <span style={{color:azonosNap(d,ma)?"#FF3B30":"#8E8E93"}}> {d.getDate()}. {HONAPOK[d.getMonth()]}</span>
          {u&&<span style={{color:"#FF3B30",fontSize:12,marginLeft:8}}>🇭🇺 {u}</span>}
        </button>
        {lista.length?lista.map(renderEsemeny):<div style={styles.hetUres}>—</div>}
      </div>
    );
  };

  /* ---- Kiválasztott nap fejléce + jelenlét + események ---- */
  const napFej=(d)=>{
    const u=unnepNev(d);
    return (
      <div style={styles.agendaFej}>
        <div>
          <div style={styles.agendaDatum}>{NAPOK_TELJES[hetfoIndex(d)]}, {d.getDate()}. {HONAPOK[d.getMonth()]}</div>

        </div>
        {canEdit&&<button onClick={ujEsemeny} style={styles.agendaPlus}>＋ Esemény</button>}
      </div>
    );
  };
  const jelenletSav=(d)=> kollegak.length?(
    <div style={styles.jelenletSav}>
      <div style={styles.jelenletCim}>Jelenlét</div>
      <div style={styles.jelenletLista}>
        {kollegak.filter(k=>!csapatSzuro||k.csapat===csapatSzuro).map(k=>{ const j=jelenlet(k.id,d); return (
          <div key={k.id} style={styles.jelenletElem} title={j.cimke}>
            <span>{j.ikon}</span>
            <span style={{color:szinHex(k.szin),fontWeight:600}}>{k.nev}</span>
            <span style={{color:"#8E8E93",fontSize:12}}>{j.cimke}</span>
          </div> ); })}
      </div>
    </div>
  ):null;

  const napEsemenyek=napAgenda(kivalasztottNap);

  return (
    <div className={temaSotet?"app sotet":"app"} style={styles.app}>
      <style>{css}</style>

      {/* ===== Fejléc ===== */}
      <header style={styles.fejlec}>
        <div style={styles.appSor}>
          <button onClick={()=>{ setKereso(kereso===null?"":null); }} style={styles.appIkon} aria-label="Keresés">🔍</button>
          <div style={styles.appCim}>{APP_NEV}</div>
          <button onClick={()=>setBeallitasok(true)} style={styles.appIkon} aria-label="Beállítások">⚙️</button>
        </div>

        {kereso!==null && (
          <div style={{padding:"0 12px 8px"}}>
            <div style={{position:"relative"}}>
              <input autoFocus value={kereso} onChange={e=>setKereso(e.target.value)} placeholder="Keresés eseményekben…"
                style={styles.keresoInput}/>
              {kereso && (
                <button onMouseDown={e=>e.preventDefault()} onClick={()=>setKereso("")} style={styles.keresoTorol} aria-label="Keresés törlése">✕</button>
              )}
            </div>
          </div>
        )}

        <div style={styles.fejlecFelso}>
          <button onClick={()=>lepHonap(-1)} style={styles.chevron} aria-label="Előző hónap">‹</button>
          <h1 style={styles.honapCim}>
            <span style={{color:"#FF3B30"}}>{HONAPOK[megjelenitettHonap.getMonth()]}</span>{" "}
            <span style={{color:"var(--txt)"}}>{megjelenitettHonap.getFullYear()}</span>
          </h1>
          <button onClick={()=>lepHonap(1)} style={styles.chevron} aria-label="Következő hónap">›</button>
          <div style={{flex:1}} />
          <button onClick={ugrasMa} style={styles.maGomb}>Ma</button>
          <button onClick={()=>setKollegaPanel(true)} style={styles.ikonGomb} aria-label="Kollégák">👥</button>
          {canEdit&&<button onClick={ujEsemeny} style={styles.plusGomb} aria-label="Új esemény">＋</button>}
        </div>

        {/* Nézetváltó */}
        <div style={styles.szegmens}>
          {[["honap","Hónap"],["het","Hét"],["nap","Nap"]].map(([id,nev])=>(
            <button key={id} onClick={()=>setNezet(id)} style={{...styles.szegmensGomb, ...(nezet===id?styles.szegmensAktiv:{})}}>{nev}</button>
          ))}
        </div>

        {/* Szűrők */}
        <div style={styles.szuroSor}>
          {csapatok.length>0 && (
            <select value={csapatSzuro} onChange={e=>setCsapatSzuro(e.target.value)} style={styles.csapatSelect}>
              <option value="">Minden csapat</option>
              {csapatok.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          )}
          <button onClick={()=>setSzuro(null)} style={{...styles.chip, ...(szuro===null?styles.chipAktiv:{})}}>Mindenki</button>
          {kollegak.map(k=>{ const a=szuro===k.id; return (
            <button key={k.id} onClick={()=>setSzuro(a?null:k.id)} style={{...styles.chip, ...(a?{background:szinHex(k.szin),color:"#fff",borderColor:szinHex(k.szin)}:{})}}>
              <span style={{width:8,height:8,borderRadius:8,background:a?"#fff":szinHex(k.szin),display:"inline-block",marginRight:6}} />{k.nev}
            </button> ); })}
        </div>

        {nezet==="honap" && (
          <div style={styles.hetSor}>{NAPOK_ROVID.map((n,i)=><div key={n} style={{...styles.hetNap,color:i>=5?"#FF3B30":"#8E8E93"}}>{n}</div>)}</div>
        )}
      </header>

      {/* ===== Keresési találatok ===== */}
      {kereso!==null && kereso.trim() ? (
        <section style={styles.agenda}>
          <div style={{...styles.agendaFej}}><div style={styles.agendaDatum}>Találatok ({talalatok.length})</div></div>
          {talalatok.length?talalatok.map(e=>(
            <div key={e.id}>
              <div style={styles.talalatDatum}>{rovidDatum(e.datum)}</div>
              {renderEsemeny(e)}
            </div>
          )):<div style={styles.ures}>Nincs találat.</div>}
        </section>
      ) : (
      <>
        {/* ===== Hónap rács ===== */}
        {nezet==="honap" && (
          <div style={styles.racsKeret} onTouchStart={erintKezd} onTouchEnd={erintVeg}>
            <div key={`${megjelenitettHonap.getFullYear()}-${megjelenitettHonap.getMonth()}`}
              style={{...styles.racs, animation: slide===1?"beJobbrol .25s ease":slide===-1?"beBalrol .25s ease":undefined}}>
              {napok.map((d,i)=>{
                const ezAHonap=d.getMonth()===megjelenitettHonap.getMonth();
                const maE=azonosNap(d,ma); const kiv=azonosNap(d,kivalasztottNap);
                const hetvege=hetfoIndex(d)>=5; const u=unnepNev(d);
                const lista=napAgenda(d); const szinek=[];
                lista.forEach(e=>esemenySzinek(e).forEach(h=>{ if(!szinek.includes(h)) szinek.push(h); }));
                return (
                  <button key={i} onClick={()=>setKivalasztottNap(new Date(d))} style={styles.cellaGomb}>
                    <div style={{...styles.napSzam, ...(maE?{background:"#FF3B30"}:kiv?{background:"#1C1C1E"}:{}),
                      color: maE||kiv?"#fff":(!ezAHonap?"var(--faint)":(hetvege||u)?"#FF3B30":"var(--txt)")}}>{d.getDate()}</div>
                    <div style={styles.pontSor}>{szinek.slice(0,4).map((h,idx)=><span key={idx} style={{width:5,height:5,borderRadius:5,background:h}} />)}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* ===== Tartalom nézet szerint ===== */}
        {nezet==="het" ? (
          <section style={styles.agenda}>
            <div style={{...styles.agendaFej}}>
              <div style={styles.agendaDatum}>A hét: {rovidDatum(ymd(hetKezdet(kivalasztottNap)))}</div>
              {canEdit&&<button onClick={ujEsemeny} style={styles.agendaPlus}>＋ Esemény</button>}
            </div>
            {Array.from({length:7}).map((_,i)=>{ const d=new Date(hetKezdet(kivalasztottNap)); d.setDate(d.getDate()+i); return renderNapBlokk(d); })}
          </section>
        ) : (
          <section style={styles.agenda}>
            {napFej(kivalasztottNap)}
            {jelenletSav(kivalasztottNap)}
            {napEsemenyek.length?napEsemenyek.map(renderEsemeny):(
              <div style={styles.ures}>Nincs esemény ezen a napon.{canEdit&&<div style={{marginTop:6,fontSize:13,color:"#C7C7CC"}}>Koppints a „＋ Esemény” gombra.</div>}</div>
            )}
          </section>
        )}
      </>
      )}

      <footer style={styles.verzio}>{VERZIO}</footer>

      {/* ===== Esemény modal ===== */}
      {modal && (
        <div style={styles.overlay} onClick={()=>setModal(null)}>
          <div style={styles.lap} onClick={e=>e.stopPropagation()}>
            <div style={styles.lapFej}>
              <button onClick={()=>setModal(null)} style={styles.lapMegse}>{canEdit?"Mégse":"Bezár"}</button>
              <span style={styles.lapCim}>{modal.id?"Esemény":"Új esemény"}</span>
              {canEdit?<button onClick={mentModal} style={{...styles.lapKesz,opacity:modal.cim.trim()?1:0.4}}>Kész</button>:<span style={{width:48}} />}
            </div>
            <div style={styles.lapTorzs}>
              {!canEdit && <div style={styles.olvasBanner}>Csak megtekintés – nincs szerkesztési jogosultságod.</div>}

              <input autoFocus={canEdit} disabled={!canEdit} value={modal.cim} onChange={e=>setModal({...modal,cim:e.target.value})}
                placeholder="Cím (pl. Ügyfél-egyeztetés)" style={styles.cimInput}/>

              {/* Kategória */}
              <div style={styles.mezoCsoport}>
                <label style={styles.mezo}><span style={styles.mezoCimke}>Kategória</span>
                  <select disabled={!canEdit} value={modal.kategoria} onChange={e=>setModal({...modal,kategoria:e.target.value})} style={styles.select}>
                    {KATEGORIAK.map(k=><option key={k.id} value={k.id}>{k.ikon} {k.nev}</option>)}
                  </select>
                </label>
                <label style={{...styles.mezo,...styles.mezoElvalaszto}}><span style={styles.mezoCimke}>Állapot</span>
                  <select disabled={!canEdit} value={modal.allapot} onChange={e=>setModal({...modal,allapot:e.target.value})} style={styles.select}>
                    <option value="megerosit">Megerősített</option><option value="elozetes">Előzetes</option>
                  </select>
                </label>
              </div>

              <KollegaValaszto kollegak={kollegak} kivalasztott={modal.kollegaIds} olvas={!canEdit} onValt={(ids)=>setModal({...modal,kollegaIds:ids})}/>

              {utkozesek.length>0 && (
                <div style={styles.utkozesBanner}>
                  ⚠️ Időpont-ütközés: {utkozesek.slice(0,4).map((u,i)=>`${u.nev} (${u.cim})`).join(", ")}{utkozesek.length>4?"…":""}
                </div>
              )}

              <div style={styles.mezoCsoport}>
                <div style={styles.mezo}><span style={{...styles.mezoCimke,width:"auto",flex:1}}>Egész napos</span>
                  <Switch on={modal.egeszNapos} onClick={()=>canEdit&&setModal({...modal,egeszNapos:!modal.egeszNapos})}/></div>
              </div>

              <div style={styles.mezoCsoport}>
                <label style={styles.mezo}><span style={styles.mezoCimke}>Kezdő nap</span>
                  <input type="date" disabled={!canEdit} value={modal.datum} onChange={e=>{const d=e.target.value;setModal(m=>({...m,datum:d,vegDatum:m.vegDatum<d?d:m.vegDatum}));}} style={styles.input}/></label>
                {!modal.egeszNapos&&<label style={{...styles.mezo,...styles.mezoElvalaszto}}><span style={styles.mezoCimke}>Kezdés</span>
                  <input type="time" disabled={!canEdit} value={modal.kezdo} onChange={e=>setModal({...modal,kezdo:e.target.value})} style={styles.input}/></label>}
                <label style={{...styles.mezo,...styles.mezoElvalaszto}}><span style={styles.mezoCimke}>Záró nap</span>
                  <input type="date" disabled={!canEdit} value={modal.vegDatum} min={modal.datum} onChange={e=>{const d=e.target.value;setModal(m=>({...m,vegDatum:d<m.datum?m.datum:d}));}} style={styles.input}/></label>
                {!modal.egeszNapos&&<label style={{...styles.mezo,...styles.mezoElvalaszto}}><span style={styles.mezoCimke}>Vége</span>
                  <input type="time" disabled={!canEdit} value={modal.veg} onChange={e=>setModal({...modal,veg:e.target.value})} style={styles.input}/></label>}
              </div>

              {/* Ismétlés */}
              <div style={styles.mezoCsoport}>
                <label style={styles.mezo}><span style={styles.mezoCimke}>Ismétlés</span>
                  <select disabled={!canEdit} value={modal.ismetles} onChange={e=>setModal({...modal,ismetles:e.target.value})} style={styles.select}>
                    <option value="nincs">Nincs</option><option value="nap">Naponta</option><option value="het">Hetente</option><option value="honap">Havonta</option>
                  </select>
                </label>
                {modal.ismetles!=="nincs"&&<label style={{...styles.mezo,...styles.mezoElvalaszto}}><span style={styles.mezoCimke}>Ismétlés vége</span>
                  <input type="date" disabled={!canEdit} value={modal.ismetlesVeg} onChange={e=>setModal({...modal,ismetlesVeg:e.target.value})} style={styles.input}/></label>}
              </div>

              <div style={styles.mezoCsoport}>
                <label style={styles.mezo}><span style={styles.mezoCimke}>Helyszín</span>
                  <input disabled={!canEdit} value={modal.helyszin} onChange={e=>setModal({...modal,helyszin:e.target.value})} placeholder="pl. 3. tárgyaló" style={styles.input}/></label>
                <label style={{...styles.mezo,...styles.mezoElvalaszto}}><span style={styles.mezoCimke}>Online link</span>
                  <input disabled={!canEdit} value={modal.link} onChange={e=>setModal({...modal,link:e.target.value})} placeholder="Teams / Zoom URL" style={styles.input}/></label>
              </div>

              {modal.link && <a href={modal.link} target="_blank" rel="noreferrer" style={styles.linkGomb}>🔗 Online hivatkozás megnyitása</a>}

              <div style={styles.mezoCsoport}>
                <label style={{...styles.mezo,alignItems:"flex-start"}}><span style={{...styles.mezoCimke,paddingTop:4}}>Megjegyzés</span>
                  <textarea disabled={!canEdit} value={modal.megjegyzes} onChange={e=>setModal({...modal,megjegyzes:e.target.value})} placeholder="Részletek…" rows={3} style={{...styles.input,resize:"none",fontFamily:"inherit"}}/></label>
              </div>

              <Ertesites esemeny={modal} kollegak={kollegak}/>

              {modal.modositotta && (
                <div style={styles.meta}>Létrehozta: {kollegak.find(k=>k.id===modal.letrehozta)?.nev||"—"} · Módosítva: {kollegak.find(k=>k.id===modal.modositotta)?.nev||"—"}{modal.modositva?` (${modal.modositva})`:""}</div>
              )}

              {modal.id&&canEdit&&<button onClick={torolModal} style={styles.torolGomb}>Esemény törlése</button>}
            </div>
          </div>
        </div>
      )}

      {kollegaPanel && <KollegaPanel kollegak={kollegak} onMentes={mentKollegak} onBezar={()=>setKollegaPanel(false)}/>}

      {beallitasok && (
        <Beallitasok kollegak={kollegak} enId={enId} onEnId={valtEnId} temaSotet={temaSotet} onTema={valtTema}
          onIcs={osszesIcs} onCsv={csvExport} digestLink={napiDigestLink()} onNyomtat={()=>window.print()} onBezar={()=>setBeallitasok(false)}/>
      )}
    </div>
  );
}

/* ===================== Beállítások panel ===================== */
function Beallitasok({kollegak,enId,onEnId,temaSotet,onTema,onIcs,onCsv,digestLink,onNyomtat,onBezar}){
  return (
    <div style={styles.overlay} onClick={onBezar}>
      <div style={styles.lap} onClick={e=>e.stopPropagation()}>
        <div style={styles.lapFej}><button onClick={onBezar} style={styles.lapMegse}>Kész</button><span style={styles.lapCim}>Beállítások</span><span style={{width:48}} /></div>
        <div style={styles.lapTorzs}>
          <div style={styles.mezoCsoport}>
            <label style={styles.mezo}><span style={{...styles.mezoCimke,width:90}}>Ki vagy te?</span>
              <select value={enId} onChange={e=>onEnId(e.target.value)} style={styles.select}>
                <option value="">— válassz —</option>
                {kollegak.map(k=><option key={k.id} value={k.id}>{k.nev}{k.szerep==="nezo"?" (néző)":""}</option>)}
              </select>
            </label>
          </div>
          <div style={styles.mezoCsoport}>
            <div style={styles.mezo}><span style={{...styles.mezoCimke,width:"auto",flex:1}}>Sötét mód</span><Switch on={temaSotet} onClick={onTema}/></div>
          </div>
          <div style={styles.mezoCsoport}>
            <a href={digestLink} style={styles.menuGomb}>📧 Mai program kiküldése e-mailben</a>
            <button onClick={onIcs} style={{...styles.menuGomb,borderTop:"1px solid var(--line)"}}>📅 Teljes naptár exportálása (.ics)</button>
            <button onClick={onCsv} style={{...styles.menuGomb,borderTop:"1px solid var(--line)"}}>📄 Exportálás táblázatba (.csv)</button>
            <button onClick={onNyomtat} style={{...styles.menuGomb,borderTop:"1px solid var(--line)"}}>🖨️ Nyomtatás</button>
          </div>
          <p style={{fontSize:12,color:"#8E8E93",lineHeight:1.5}}>
            A „ki vagy te?" és a sötét mód csak ezen az eszközön érvényes. Az események és kollégák megosztottak.
            Az .ics fájlt bárki importálhatja a saját naptárába (Google/Outlook), és onnantól automatikusan emlékeztet.
          </p>
          <div style={{textAlign:"center",fontSize:11,color:"#C7C7CC",marginTop:8}}>{APP_NEV} {VERZIO}</div>
        </div>
      </div>
    </div>
  );
}

/* ===================== Értesítés gombok ===================== */
function Ertesites({esemeny,kollegak}){
  const emailek=esemenyEmailek(esemeny,kollegak); const vanEmail=emailek.length>0;
  return (
    <div style={styles.mezoCsoport}>
      <a href={vanEmail?mailtoLink(esemeny,kollegak):undefined} onClick={vanEmail?undefined:(e)=>e.preventDefault()}
        style={{...styles.ertesitesGomb, ...(vanEmail?{}:{opacity:0.4,cursor:"default"})}}>
        <span>✉️ Emlékeztető e-mailben</span><span style={{fontSize:13,color:"#8E8E93"}}>{vanEmail?`${emailek.length} címzett`:"nincs e-mail cím"}</span>
      </a>
      <button onClick={()=>icsLetoltesEgy(esemeny,kollegak)} style={{...styles.ertesitesGomb,borderTop:"1px solid var(--line)"}}>
        <span>📅 Naptár-meghívó (.ics)</span><span style={{fontSize:13,color:"#8E8E93"}}>automata emlékeztető</span>
      </button>
    </div>
  );
}

/* ===================== Több kolléga választó ===================== */
function KollegaValaszto({kollegak,kivalasztott,onValt,olvas}){
  const [nyitva,setNyitva]=useState(false);
  const valt=(id)=>!olvas&&onValt(kivalasztott.includes(id)?kivalasztott.filter(x=>x!==id):[...kivalasztott,id]);
  const nevek=kivalasztott.map(id=>kollegak.find(k=>k.id===id)).filter(Boolean);
  return (
    <div style={styles.mezoCsoport}>
      <button onClick={()=>setNyitva(n=>!n)} style={{...styles.mezo,width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
        <span style={styles.mezoCimke}>Kollégák</span>
        <span style={{flex:1,fontSize:15,color:nevek.length?"var(--txt)":"#C7C7CC",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {nevek.length?nevek.map((k,i)=><span key={k.id} style={{color:szinHex(k.szin),fontWeight:600}}>{k.nev}{i<nevek.length-1?", ":""}</span>):"Válassz egy vagy több kollégát"}
        </span>
        <span style={{color:"#C7C7CC",marginLeft:6,transform:nyitva?"rotate(90deg)":"none",transition:"transform .15s"}}>›</span>
      </button>
      {nyitva&&(
        <div style={{borderTop:"1px solid var(--line)"}}>
          {kollegak.length===0&&<div style={{padding:"12px 14px",color:"#8E8E93",fontSize:14}}>Nincs kolléga.</div>}
          {kollegak.map(k=>{ const be=kivalasztott.includes(k.id); return (
            <button key={k.id} onClick={()=>valt(k.id)} style={styles.checkSor}>
              <span style={{width:10,height:10,borderRadius:10,background:szinHex(k.szin),flexShrink:0}} />
              <span style={{flex:1,fontSize:15,color:"var(--txt)"}}>{k.nev}{k.csapat?<span style={{color:"#8E8E93",fontSize:13}}> · {k.csapat}</span>:null}</span>
              <span style={{color:"#34C759",fontSize:18,fontWeight:700,opacity:be?1:0}}>✓</span>
            </button> ); })}
        </div>
      )}
    </div>
  );
}

/* ===================== iOS kapcsoló ===================== */
function Switch({on,onClick}){
  return (
    <button onClick={onClick} aria-pressed={on}
      style={{width:51,height:31,borderRadius:31,background:on?"#34C759":"#E5E5EA",border:"none",position:"relative",cursor:"pointer",transition:"background .2s",flexShrink:0,padding:0}}>
      <span style={{position:"absolute",top:2,left:on?22:2,width:27,height:27,borderRadius:27,background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.3)",transition:"left .2s"}} />
    </button>
  );
}

/* ===================== Kolléga kezelő ===================== */
function KollegaPanel({kollegak,onMentes,onBezar}){
  const [lista,setLista]=useState(kollegak.map(k=>({email:"",csapat:"",szerep:"szerkeszto",...k})));
  const [ujNev,setUjNev]=useState("");
  const hasznalt=lista.map(k=>k.szin); const kov=SZINEK.find(s=>!hasznalt.includes(s.id))?.id||SZINEK[0].id;
  const hozzaad=()=>{ if(!ujNev.trim())return; setLista([...lista,{id:ujId(),nev:ujNev.trim(),szin:kov,email:"",csapat:"",szerep:"szerkeszto"}]); setUjNev(""); };
  const torol=(id)=>setLista(lista.filter(k=>k.id!==id));
  const valt=(id,m,v)=>setLista(lista.map(k=>k.id===id?{...k,[m]:v}:k));
  return (
    <div style={styles.overlay} onClick={onBezar}>
      <div style={styles.lap} onClick={e=>e.stopPropagation()}>
        <div style={styles.lapFej}><button onClick={onBezar} style={styles.lapMegse}>Mégse</button><span style={styles.lapCim}>Kollégák</span>
          <button onClick={()=>{onMentes(lista);onBezar();}} style={{...styles.lapKesz,opacity:1}}>Kész</button></div>
        <div style={styles.lapTorzs}>
          {lista.map(k=>(
            <div key={k.id} style={styles.kollegaKartya}>
              <div style={styles.kollegaFejlec}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {SZINEK.map(s=><button key={s.id} onClick={()=>valt(k.id,"szin",s.id)} aria-label={s.nev}
                    style={{width:18,height:18,borderRadius:18,background:s.hex,border:k.szin===s.id?"2px solid var(--txt)":"2px solid transparent",cursor:"pointer",padding:0}}/>)}
                </div>
                <button onClick={()=>torol(k.id)} style={styles.miniTorol} aria-label="Törlés">✕</button>
              </div>
              <input value={k.nev} onChange={e=>valt(k.id,"nev",e.target.value)} placeholder="Név" style={{...styles.kartyaInput,fontWeight:600,color:szinHex(k.szin)}}/>
              <input value={k.email||""} onChange={e=>valt(k.id,"email",e.target.value)} type="email" placeholder="E-mail cím (opcionális)"
                style={{...styles.kartyaInput,color:k.email&&!ervenyesEmail(k.email)?"#FF3B30":"var(--txt)"}}/>
              <div style={{display:"flex",gap:10}}>
                <input value={k.csapat||""} onChange={e=>valt(k.id,"csapat",e.target.value)} placeholder="Csapat / részleg" style={{...styles.kartyaInput,flex:1}}/>
                <select value={k.szerep||"szerkeszto"} onChange={e=>valt(k.id,"szerep",e.target.value)} style={{...styles.kartyaInput,flex:1}}>
                  {SZEREPEK.map(s=><option key={s.id} value={s.id}>{s.nev}</option>)}
                </select>
              </div>
            </div>
          ))}
          <div style={{...styles.mezoCsoport,marginTop:4}}>
            <div style={{display:"flex",gap:8,alignItems:"center",padding:"4px 8px"}}>
              <input value={ujNev} onChange={e=>setUjNev(e.target.value)} onKeyDown={e=>e.key==="Enter"&&hozzaad()} placeholder="Új kolléga neve" style={styles.input}/>
              <button onClick={hozzaad} style={styles.hozzaadGomb}>Hozzáad</button>
            </div>
          </div>
          <p style={{fontSize:12,color:"#8E8E93",marginTop:14,lineHeight:1.5}}>
            A szerepkör jelenleg lágy jogosultság (a „Néző" nem szerkeszt). Valódi, biztonságos belépéshez háttérrendszer kell.
          </p>
        </div>
      </div>
    </div>
  );
}
